site_name: OpenSage
site_description: OpenSage Development Documentation

# Documentation directory (where markdown files are)
docs_dir: docs/wiki

# Output directory (generated static site)
site_dir: site

# Temporarily hide API reference pages from the build.
exclude_docs: |
  generated/api/*.md
  API-Reference.md
  RL-Integration.md

# Repository information
repo_url: https://github.com/opensage-agent/OpenSage
repo_name: opensage-agent/OpenSage

# Theme
theme:
  name: material
  logo: assets/logos/opensage-logo.svg
  favicon: assets/logos/opensage-favicon.svg
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

# Build-time hooks (generate docs automatically)
hooks:
  - docs/hooks/generate_opensage_cli_reference.py

# Plugins
plugins:
  - search
  - minify:
      minify_html: true
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: false
            show_root_heading: true
            show_root_toc_entry: true
            show_signature_annotations: true

# Markdown extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Custom styles (logo sizing, small UI tweaks)
extra_css:
  - assets/stylesheets/extra.css

# Navigation structure
nav:
  - Home: index.md
  - User Guide:
    - Getting Started:
      - Introduction: Introduction.md
      - Getting Started: Getting-Started.md
      - Project Structure: Project-Structure.md
    - Practices:
      - Best Practices: Best-Practices.md
      - Testing & Debugging: Testing-Debugging.md
    - Configuration: Configuration.md
  - Developer Guide:
    - Core:
      - Development Guides: Development-Guides.md
      - Core Components: Core-Components.md
    - Extending:
      - Adding Tools: Adding-Tools.md
      - Plugins: Plugins.md
      - Sandboxes:
        - Sandbox System Guide: Sandboxes.md
        - Adding a Sandbox: Adding-a-Sandbox.md
        - Adding a New Sandbox Backend: Adding-a-New-Sandbox-Backend.md
      - RL Integration:
        - AReaL Training: rl_integration/AReaL-Training.md
        - Slime Training: rl_integration/slime-Training.md
  - CLI Reference:
    - Overview: cli/index.md
    - opensage:
      - Flag Reference: generated/cli/opensage.md
    - opensage web:
      - Guide: cli/opensage-web.md
      - Flag Reference: generated/cli/opensage-web.md
    - opensage dependency-check:
      - Guide: cli/dependency-check.md
      - Flag Reference: generated/cli/opensage-dependency-check.md
  - Evaluation:
    - Overview: evaluation/index.md
    - Workflow Details: evaluation/workflow.md
    - Adding a Benchmark: evaluation/adding-evaluations.md
  - Community:
    - Overview: Community.md
    - Contributing: Contributing.md

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/opensage-agent/OpenSage
